name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      SITE_BUCKET: ${{ vars.SITE_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
      MYAXIS_API_BASE_URL: ${{ vars.MYAXIS_API_BASE_URL }}
      MYAXIS_COGNITO_REGION: ${{ vars.MYAXIS_COGNITO_REGION }}
      MYAXIS_COGNITO_USER_POOL_ID: ${{ vars.MYAXIS_COGNITO_USER_POOL_ID }}
      MYAXIS_COGNITO_CLIENT_ID: ${{ vars.MYAXIS_COGNITO_CLIENT_ID }}
      MYAXIS_COGNITO_HOSTED_UI_DOMAIN: ${{ vars.MYAXIS_COGNITO_HOSTED_UI_DOMAIN }}
      MYAXIS_COGNITO_REDIRECT_URI: ${{ vars.MYAXIS_COGNITO_REDIRECT_URI }}
      MYAXIS_COGNITO_LOGOUT_URI: ${{ vars.MYAXIS_COGNITO_LOGOUT_URI }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Build static site
        run: ./scripts/build.sh

      - name: Sync site to S3
        run: aws s3 sync dist/ "s3://${SITE_BUCKET}" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
